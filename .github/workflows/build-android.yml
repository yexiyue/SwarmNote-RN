name: Build Android

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Gradle build variant
        type: choice
        options: [release, debug]
        default: release

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "17"
  NDK_VERSION: r27c
  PNPM_VERSION: "10"

jobs:
  build:
    name: Build Android (${{ inputs.build_type }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Android NDK ${{ env.NDK_VERSION }}
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          link-to-sdk: true

      - name: Setup Rust toolchain (Android targets)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
          cache-workspaces: packages/swarmnote-core/rust/mobile-core

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build editor WebView bundle
        run: pnpm --filter @swarmnote/editor-web build

      - name: Build Rust bridge (ubrn android)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: pnpm --filter react-native-swarmnote-core ubrn:android

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean --no-install

      - name: Decode release keystore
        if: inputs.build_type == 'release'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Gradle assemble (${{ inputs.build_type }})
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a --no-daemon --stacktrace
          else
            ./gradlew assembleDebug -PreactNativeArchitectures=arm64-v8a --no-daemon --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: swarmnote-android-${{ inputs.build_type }}-${{ github.sha }}
          path: android/app/build/outputs/apk/${{ inputs.build_type }}/*.apk
          if-no-files-found: error
          retention-days: 14
