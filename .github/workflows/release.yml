name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "17"
  NDK_VERSION: r27c
  PNPM_VERSION: "10"

jobs:
  generate-changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog (this release)
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

  build-android:
    name: Build Android (release)
    needs: [generate-changelog]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
      apk_url: ${{ steps.stage.outputs.apk_url }}
    env:
      EXPO_PUBLIC_UPGRADELINK_ACCESS_KEY: ${{ secrets.UPGRADE_LINK_ACCESS_KEY }}
      EXPO_PUBLIC_UPGRADELINK_ACCESS_SECRET: ${{ secrets.UPGRADE_LINK_ACCESS_SECRET }}
      EXPO_PUBLIC_UPGRADELINK_APK_KEY: ${{ secrets.UPGRADE_LINK_APK_KEY }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            VERSION=$(jq -r '.version' package.json)
            TAG="v${VERSION}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Android NDK ${{ env.NDK_VERSION }}
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          link-to-sdk: true

      - name: Setup Rust toolchain (Android targets)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
          cache-workspaces: packages/swarmnote-core/rust/mobile-core

      - name: Install cargo-ndk
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build editor WebView bundle
        run: pnpm --filter @swarmnote/editor-web build

      - name: Build Rust bridge (ubrn android, release profile)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: pnpm --filter react-native-swarmnote-core ubrn:android:release

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean --no-install

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Gradle assembleRelease
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a --no-daemon --stacktrace

      - name: Stage APKs with versioned names
        id: stage
        run: |
          mkdir -p artifacts
          PRIMARY=""
          for apk in android/app/build/outputs/apk/release/*.apk; do
            base=$(basename "$apk" .apk)
            target="mobile-${{ steps.tag.outputs.tag }}-${base}.apk"
            cp "$apk" "artifacts/${target}"
            if [ -z "$PRIMARY" ]; then PRIMARY="$target"; fi
          done
          ls -l artifacts
          echo "apk_url=https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/${PRIMARY}" >> "$GITHUB_OUTPUT"

      - name: Create draft release and upload APKs
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: SwarmNote Mobile ${{ steps.tag.outputs.tag }}
          body: ${{ needs.generate-changelog.outputs.changelog }}
          draft: true
          prerelease: false
          files: artifacts/*.apk

  publish-release:
    name: Publish release
    needs: [build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            VERSION=$(jq -r '.version' package.json)
            TAG="v${VERSION}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Promote draft to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ steps.tag.outputs.tag }}" --draft=false

  upgradelink-upload:
    name: Sync APK metadata to UpgradeLink
    needs: [publish-release, build-android, generate-changelog]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Sync Android APK to UpgradeLink
        uses: toolsetlink/upgradelink-action@3.0.2
        with:
          access_key: ${{ secrets.UPGRADE_LINK_ACCESS_KEY }}
          access_secret: ${{ secrets.UPGRADE_LINK_ACCESS_SECRET }}
          config: |
            {
              "app_type": "apk",
              "request": {
                "app_key": "${{ secrets.UPGRADE_LINK_APK_KEY }}",
                "version": "${{ needs.build-android.outputs.version }}",
                "url": "${{ needs.build-android.outputs.apk_url }}",
                "prompt_upgrade_content": ${{ toJSON(needs.generate-changelog.outputs.changelog) }}
              }
            }

  update-changelog:
    name: Update CHANGELOG.md
    needs: [publish-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine target branch
        id: branch
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            BRANCH=$(git branch -r --contains "${{ github.sha }}" | grep -v HEAD | sed 's|origin/||' | xargs | cut -d' ' -f1)
          else
            BRANCH="${{ github.ref_name }}"
          fi
          echo "name=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Target branch: ${BRANCH}"
          git checkout "$BRANCH"

      - name: Generate full changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: -o CHANGELOG.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet CHANGELOG.md; then
            echo "No changelog changes"
            exit 0
          fi
          git add CHANGELOG.md
          git commit -m "chore(release): update CHANGELOG.md"
          git push origin ${{ steps.branch.outputs.name }}
